<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Scanner QR – Cek Kesehatan Darah 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0d2250; --navy-mid: #1a3a6e; --red: #c0392b; --red-light: #e74c3c;
      --gold: #f0c419; --green: #1a7a4a; --green-light: #27ae60;
      --white: #ffffff; --bg: #eef2fb; --border: #d0d9ef; --text: #1a2a4a; --muted: #6b7a99;
    }
    body { font-family: "Inter", Arial, sans-serif; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

    .header { width: 100%; background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 60%, #1e4d8c 100%); padding: 22px 20px 18px; text-align: center; }
    .header-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 2.5px; color: var(--gold); text-transform: uppercase; margin-bottom: 6px; }
    .header-title { font-size: 20px; font-weight: 800; color: var(--white); }
    .header-title span { color: var(--red-light); }
    .header-sub { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 5px; }

    .status-bar { width: 100%; max-width: 480px; display: flex; }
    .stat-item { flex: 1; padding: 10px 8px; text-align: center; background: var(--navy); }
    .stat-item:nth-child(2) { background: var(--red); }
    .stat-item:nth-child(3) { background: var(--green); }
    .stat-num { font-size: 20px; font-weight: 800; color: var(--white); line-height: 1; }
    .stat-label { font-size: 9px; color: rgba(255,255,255,0.65); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

    .card { background: var(--white); width: 100%; max-width: 480px; padding: 24px 20px 28px; box-shadow: 0 8px 32px rgba(13,34,80,0.1); }

    /* TOMBOL SCAN */
    .btn-open-scanner {
      width: 100%; padding: 16px; background: var(--navy); color: var(--white);
      border: none; border-radius: 14px; font-size: 15px; font-weight: 800;
      font-family: "Inter", Arial, sans-serif; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      margin-bottom: 20px;
    }
    .btn-open-scanner:active { opacity: 0.85; }
    .btn-open-scanner svg { flex-shrink: 0; }

    /* SCANNER MODAL */
    .scanner-modal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88);
      z-index: 990; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
    }
    .scanner-modal.show { display: flex; }
    .scanner-modal-inner { width: 100%; max-width: 370px; background: #000; border-radius: 20px; overflow: hidden; position: relative; }
    .scanner-modal-header {
      background: var(--navy); padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .scanner-modal-title { font-size: 13px; font-weight: 700; color: var(--white); }
    .btn-tutup {
      background: rgba(255,255,255,0.15); border: none; color: var(--white);
      border-radius: 8px; padding: 5px 12px; font-size: 12px; font-weight: 700;
      cursor: pointer; font-family: "Inter", Arial, sans-serif;
    }
    .btn-tutup:active { opacity: 0.75; }
    #qr-reader { width: 100% !important; border: none !important; }
    #qr-reader video { border-radius: 0 !important; }
    #qr-reader img { display: none; }
    .scanner-overlay {
      position: absolute; top: 44px; left: 0; right: 0; bottom: 36px;
      pointer-events: none; display: flex; align-items: center; justify-content: center;
    }
    .scanner-frame { width: 185px; height: 185px; position: relative; }
    .scanner-frame::before, .scanner-frame::after, .corner-br, .corner-bl {
      content: ''; position: absolute; width: 26px; height: 26px;
      border-color: var(--gold); border-style: solid;
    }
    .scanner-frame::before { top:0; left:0; border-width:3px 0 0 3px; border-radius:4px 0 0 0; }
    .scanner-frame::after  { top:0; right:0; border-width:3px 3px 0 0; border-radius:0 4px 0 0; }
    .corner-br { bottom:0; right:0; border-width:0 3px 3px 0; border-radius:0 0 4px 0; }
    .corner-bl { bottom:0; left:0; border-width:0 0 3px 3px; border-radius:0 0 0 4px; }
    .scan-line {
      position: absolute; left:0; right:0; height:2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      animation: scanMove 2s linear infinite;
    }
    @keyframes scanMove { 0%{top:10%} 50%{top:85%} 100%{top:10%} }
    .scanner-hint { color: rgba(255,255,255,0.55); font-size: 12px; text-align: center; padding: 10px; background: #000; }

    /* MANUAL */
    .divider-label {
      text-align: center; font-size: 11px; color: var(--muted); font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase; margin: 0 0 16px; position: relative;
    }
    .divider-label::before, .divider-label::after {
      content: ''; position: absolute; top: 50%; width: 35%; height: 1px; background: var(--border);
    }
    .divider-label::before { left:0; } .divider-label::after { right:0; }
    .input-row { display: flex; gap: 8px; }
    .input-row input {
      flex:1; padding:12px 14px; border:1.5px solid var(--border); border-radius:10px;
      font-size:14px; font-family:"Inter",Arial,sans-serif; background:#f7f9ff; color:var(--text);
    }
    .input-row input:focus { outline:none; border-color:var(--navy-mid); }
    .btn-cek {
      padding:12px 18px; background:var(--navy); color:var(--white); border:none;
      border-radius:10px; font-size:13px; font-weight:700; font-family:"Inter",Arial,sans-serif;
      cursor:pointer; white-space:nowrap;
    }
    .btn-cek:active { opacity:0.85; }

    /* RESULT */
    .result-card { display:none; border-radius:14px; overflow:hidden; margin-top:20px; border:2px solid var(--border); }
    .result-card.show { display:block; }
    .result-header { padding:14px 16px; display:flex; align-items:center; gap:10px; }
    .result-header.valid   { background:#e8f8ef; border-bottom:2px solid #27ae60; }
    .result-header.invalid { background:#fdecea; border-bottom:2px solid var(--red); }
    .result-header.sudah   { background:#fff3cd; border-bottom:2px solid var(--gold); }
    .result-icon { font-size:28px; }
    .result-title { font-size:15px; font-weight:800; color:var(--text); }
    .result-sub { font-size:11px; color:var(--muted); margin-top:2px; }
    .result-body { padding:16px; }
    .result-body table { width:100%; border-collapse:collapse; }
    .result-body td { padding:7px 4px; font-size:13px; border-bottom:1px solid #f0f2f8; vertical-align:top; }
    .result-body td:first-child { color:var(--muted); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; width:38%; }
    .result-body td:last-child { color:var(--text); font-weight:600; }
    .status-badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:700; }
    .status-badge.belum { background:#e8f8ef; color:var(--green); }
    .status-badge.sudah { background:#fff3cd; color:#7a5c00; }
    .no-antri-box { background:#fff3cd; border-radius:12px; padding:14px; text-align:center; margin-bottom:4px; }
    .no-antri-box .lbl { font-size:11px; color:#7a5c00; font-weight:600; letter-spacing:1px; text-transform:uppercase; }
    .no-antri-box .num { font-size:52px; font-weight:800; color:var(--red); line-height:1.1; }
    .qr-preview { display:flex; justify-content:center; margin:12px 0 4px; }
    .qr-preview img { width:110px; height:110px; border-radius:10px; border:2px solid var(--border); }
    .btn-approve {
      width:100%; margin-top:16px; padding:14px;
      background:linear-gradient(135deg, var(--green), var(--green-light));
      color:var(--white); border:none; border-radius:12px; font-size:15px; font-weight:800;
      font-family:"Inter",Arial,sans-serif; cursor:pointer;
    }
    .btn-approve:active { opacity:0.85; }
    .btn-approve:disabled { background:#ccc; cursor:not-allowed; }
    .btn-scan-lagi {
      width:100%; margin-top:10px; padding:12px; background:transparent;
      color:var(--navy); border:1.5px solid var(--border); border-radius:12px;
      font-size:14px; font-weight:700; font-family:"Inter",Arial,sans-serif; cursor:pointer;
    }

    .toast {
      position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
      background:var(--navy); color:var(--white); padding:12px 24px; border-radius:30px;
      font-size:13px; font-weight:600; transition:transform 0.3s ease;
      z-index:999; white-space:nowrap; box-shadow:0 4px 20px rgba(0,0,0,0.2);
    }
    .toast.show { transform:translateX(-50%) translateY(0); }
    .toast.success { background:var(--green); }
    .toast.error   { background:var(--red); }

    .loading-overlay {
      display:none; position:fixed; inset:0; background:rgba(13,34,80,0.45);
      z-index:998; align-items:center; justify-content:center; flex-direction:column; gap:12px;
    }
    .loading-overlay.show { display:flex; }
    .spinner { width:44px; height:44px; border:4px solid rgba(255,255,255,0.3); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loading-overlay p { color:var(--white); font-weight:600; font-size:14px; }

    .page-footer { width:100%; max-width:480px; padding:16px 20px; text-align:center; font-size:11px; color:var(--muted); line-height:1.6; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">Sistem Validasi Kehadiran</div>
  <div class="header-title">Scanner <span>QR Code</span></div>
  <div class="header-sub">Cek Kesehatan Darah · Minggu, 19 Juli 2026</div>
</div>

<div class="status-bar">
  <div class="stat-item"><div class="stat-num" id="statTotal">–</div><div class="stat-label">Total Daftar</div></div>
  <div class="stat-item"><div class="stat-num" id="statBelum">–</div><div class="stat-label">Belum Hadir</div></div>
  <div class="stat-item"><div class="stat-num" id="statHadir">–</div><div class="stat-label">Sudah Hadir</div></div>
</div>

<div class="card">

  <button class="btn-open-scanner" onclick="bukaScanner()">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="2" width="7" height="7" rx="1" stroke="#f0c419" stroke-width="2" fill="none"/><rect x="4" y="4" width="3" height="3" fill="#f0c419" rx="0.5"/><rect x="15" y="2" width="7" height="7" rx="1" stroke="#f0c419" stroke-width="2" fill="none"/><rect x="17" y="4" width="3" height="3" fill="#f0c419" rx="0.5"/><rect x="2" y="15" width="7" height="7" rx="1" stroke="#f0c419" stroke-width="2" fill="none"/><rect x="4" y="17" width="3" height="3" fill="#f0c419" rx="0.5"/><rect x="15" y="15" width="3" height="3" fill="#f0c419" rx="0.5"/><rect x="19" y="15" width="3" height="3" fill="#f0c419" rx="0.5"/><rect x="15" y="19" width="3" height="3" fill="#f0c419" rx="0.5"/><rect x="19" y="19" width="3" height="3" fill="#f0c419" rx="0.5"/><line x1="1" y1="12" x2="23" y2="12" stroke="#f0c419" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2 1"/></svg>
    Scan QR Code Peserta
  </button>

  <div class="divider-label">atau cari manual</div>
  <div class="input-row">
    <input type="text" id="inputKTP" placeholder="Masukkan No KTP (16 digit)" inputmode="numeric" maxlength="16" />
    <button class="btn-cek" onclick="cariManual()">🔍 Cek</button>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-header" id="resultHeader">
      <div class="result-icon" id="resultIcon"></div>
      <div>
        <div class="result-title" id="resultTitle"></div>
        <div class="result-sub" id="resultSub"></div>
      </div>
    </div>
    <div class="result-body">
      <div class="qr-preview"><img id="resultQR" src="" alt="QR" /></div>
      <table id="resultTable"></table>
      <button class="btn-approve" id="btnApprove" onclick="approveKehadiran()">✅ &nbsp;Konfirmasi Kehadiran</button>
      <button class="btn-scan-lagi" onclick="scanLagi()">↩ Scan Peserta Lain</button>
    </div>
  </div>

</div>


<!-- SCANNER MODAL -->
<div class="scanner-modal" id="scannerModal">
  <div class="scanner-modal-inner">
    <div class="scanner-modal-header">
      <span class="scanner-modal-title">📷 Arahkan ke QR Code tiket</span>
      <button class="btn-tutup" onclick="tutupScanner()">✕ Tutup</button>
    </div>
    <div style="position:relative;">
      <div id="qr-reader"></div>
      <div class="scanner-overlay">
        <div class="scanner-frame">
          <div class="corner-br"></div>
          <div class="corner-bl"></div>
          <div class="scan-line"></div>
        </div>
      </div>
    </div>
    <div class="scanner-hint">Posisikan QR Code di dalam kotak kuning</div>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p id="loadingText">Memproses...</p>
</div>
<div class="toast" id="toast"></div>

<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbylOYVEZRwqeOWQcDKPjeFgIHDB6Twt4iu-RBugr2BW9frFONyY6n2ij5VqDt3QVb-1/exec";

  let currentData = null;
  let html5QrCode = null;
  let isScanning  = false;

  function bukaScanner() {
    document.getElementById('scannerModal').classList.add('show');
    if (isScanning) return;
    isScanning = true;
    html5QrCode = new Html5Qrcode("qr-reader");
    html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 200, height: 200 } },
      (decodedText) => { tutupScanner(); prosesQR(decodedText); },
      () => {}
    ).catch(err => { console.warn("Kamera tidak tersedia:", err); isScanning = false; });
  }

  function tutupScanner() {
    document.getElementById('scannerModal').classList.remove('show');
    if (html5QrCode && isScanning) {
      html5QrCode.stop().then(() => { html5QrCode.clear(); html5QrCode = null; isScanning = false; })
        .catch(() => { html5QrCode = null; isScanning = false; });
    }
  }

  function prosesQR(text) {
    const parts = {};
    text.split('|').forEach(p => { const [k,...v]=p.split(':'); parts[k]=v.join(':'); });
    const noKTP = parts['KTP'];
    if (!noKTP) { showToast('QR tidak valid','error'); return; }
    cekPeserta(noKTP);
  }

  function cariManual() {
    const ktp = document.getElementById('inputKTP').value.trim();
    if (!ktp || ktp.length < 16) { showToast('No KTP harus 16 digit','error'); return; }
    cekPeserta(ktp);
  }

  function cekPeserta(noKTP) {
    showLoading('Mengecek data peserta...');
    fetch(`${APPS_SCRIPT_URL}?action=cek&noKTP=${encodeURIComponent(noKTP)}`)
      .then(r => r.json())
      .then(data => {
        hideLoading();
        if (data.status === 'error') { tampilError(data.pesan); }
        else { currentData = data; tampilHasil(data); }
        muatStatistik();
      })
      .catch(err => { hideLoading(); showToast('Gagal terhubung: '+err.message,'error'); });
  }

  function tampilHasil(d) {
    const sudahHadir = d.statusHadir && d.statusHadir.includes('Hadir');
    document.getElementById('resultHeader').className = 'result-header '+(sudahHadir?'sudah':'valid');
    document.getElementById('resultIcon').textContent  = sudahHadir ? '⚠️' : '✅';
    document.getElementById('resultTitle').textContent = sudahHadir ? 'Sudah Check-in!' : 'Peserta Ditemukan';
    document.getElementById('resultSub').textContent   = sudahHadir ? 'Peserta ini sudah dikonfirmasi sebelumnya' : 'Data valid – silakan konfirmasi kehadiran';
    document.getElementById('resultQR').src = d.qrURL || '';

    const formatTgl = (val) => { if(!val) return '-'; const dt=new Date(val); return isNaN(dt)?val:dt.toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'}); };
    const noAntriHtml = d.noAntri ? `<tr><td colspan="2"><div class="no-antri-box"><div class="lbl">Nomor Antrian</div><div class="num">${d.noAntri}</div></div></td></tr>` : '';

    document.getElementById('resultTable').innerHTML = `
      ${noAntriHtml}
      <tr><td>No Urut</td><td>#${String(d.noUrut).padStart(4,'0')}</td></tr>
      <tr><td>Nama</td><td>${d.nama}</td></tr>
      <tr><td>Jenis Kelamin</td><td>${d.jenisKelamin}</td></tr>
      <tr><td>No KTP</td><td>${d.noKTP}</td></tr>
      <tr><td>Tgl Lahir</td><td>${formatTgl(d.tglLahir)}</td></tr>
      <tr><td>Usia</td><td>${d.usia} tahun</td></tr>
      <tr><td>No Telp</td><td>${d.noTelp}</td></tr>
      <tr><td>Tgl Daftar</td><td>${d.tglDaftar}</td></tr>
      <tr><td>Status</td><td><span class="status-badge ${sudahHadir?'sudah':'belum'}">${sudahHadir?d.statusHadir:'⏳ Belum Hadir'}</span></td></tr>`;

    const btn = document.getElementById('btnApprove');
    btn.disabled    = sudahHadir;
    btn.textContent = sudahHadir ? '⚠️  Sudah Dikonfirmasi' : '✅  Konfirmasi Kehadiran';

    const card = document.getElementById('resultCard');
    card.classList.add('show');
    card.scrollIntoView({ behavior:'smooth', block:'start' });
  }

  function tampilError(pesan) {
    document.getElementById('resultHeader').className  = 'result-header invalid';
    document.getElementById('resultIcon').textContent  = '❌';
    document.getElementById('resultTitle').textContent = 'Peserta Tidak Ditemukan';
    document.getElementById('resultSub').textContent   = pesan;
    document.getElementById('resultTable').innerHTML   = '';
    document.getElementById('resultQR').src            = '';
    const btn = document.getElementById('btnApprove');
    btn.disabled = true; btn.textContent = '❌ Tidak Dapat Dikonfirmasi';
    const card = document.getElementById('resultCard');
    card.classList.add('show');
    card.scrollIntoView({ behavior:'smooth', block:'start' });
  }

  function approveKehadiran() {
    if (!currentData) return;
    showLoading('Menyimpan konfirmasi...');
    fetch(`${APPS_SCRIPT_URL}?action=approve&rowIndex=${currentData.rowIndex}`)
      .then(r => r.json())
      .then(res => {
        hideLoading();
        if (res.status === 'ok') {
          currentData.statusHadir = '✅ Hadir';
          if (res.noAntri) currentData.noAntri = res.noAntri;
          showToast('✅ '+currentData.nama+' – No. Antri '+currentData.noAntri, 'success');
          tampilHasil(currentData);
          muatStatistik();
        } else { showToast('Gagal: '+res.pesan,'error'); }
      })
      .catch(err => { hideLoading(); showToast('Gagal: '+err.message,'error'); });
  }

  function muatStatistik() {
    fetch(`${APPS_SCRIPT_URL}?action=statistik`)
      .then(r => r.json())
      .then(res => {
        if (res.status === 'ok') {
          document.getElementById('statTotal').textContent = res.total;
          document.getElementById('statHadir').textContent = res.hadir;
          document.getElementById('statBelum').textContent = res.belum;
        }
      }).catch(()=>{});
  }

  function scanLagi() {
    document.getElementById('resultCard').classList.remove('show');
    document.getElementById('inputKTP').value = '';
    currentData = null;
  }

  function showLoading(text) { document.getElementById('loadingText').textContent=text||'Memproses...'; document.getElementById('loadingOverlay').classList.add('show'); }
  function hideLoading() { document.getElementById('loadingOverlay').classList.remove('show'); }

  let toastTimer;
  function showToast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.className = 'toast show '+(type||'');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className='toast', 3500);
  }

  document.getElementById('inputKTP').addEventListener('keydown', e => { if(e.key==='Enter') cariManual(); });
  document.getElementById('scannerModal').addEventListener('click', function(e) { if(e.target===this) tutupScanner(); });

  muatStatistik();
</script>
</body>
</html>
