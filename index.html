<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Scanner QR – Cek Kesehatan Darah 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0d2250;
      --navy-mid: #1a3a6e;
      --red: #c0392b;
      --red-light: #e74c3c;
      --gold: #f0c419;
      --green: #1a7a4a;
      --green-light: #27ae60;
      --white: #ffffff;
      --bg: #eef2fb;
      --border: #d0d9ef;
      --text: #1a2a4a;
      --muted: #6b7a99;
    }

    body {
      font-family: "Inter", Arial, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* HEADER */
    .header {
      width: 100%;
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 60%, #1e4d8c 100%);
      padding: 22px 20px 18px;
      text-align: center;
    }
    .header-eyebrow {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2.5px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .header-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--white);
    }
    .header-title span { color: var(--red-light); }
    .header-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      margin-top: 5px;
    }

    /* STATUS BAR */
    .status-bar {
      width: 100%;
      max-width: 480px;
      display: flex;
      gap: 0;
    }
    .stat-item {
      flex: 1;
      padding: 10px 8px;
      text-align: center;
      background: var(--navy);
    }
    .stat-item:nth-child(2) { background: var(--red); }
    .stat-item:nth-child(3) { background: var(--green); }
    .stat-num {
      font-size: 20px;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
    }
    .stat-label {
      font-size: 9px;
      color: rgba(255,255,255,0.65);
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* CARD */
    .card {
      background: var(--white);
      width: 100%;
      max-width: 480px;
      padding: 24px 20px 28px;
      box-shadow: 0 8px 32px rgba(13,34,80,0.1);
    }

    /* SCANNER AREA */
    .scanner-wrap {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      background: #000;
      margin-bottom: 18px;
    }
    #qr-reader {
      width: 100% !important;
      border: none !important;
    }
    #qr-reader video {
      border-radius: 0 !important;
    }
    #qr-reader img { display: none; }

    .scanner-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .scanner-frame {
      width: 200px;
      height: 200px;
      position: relative;
    }
    .scanner-frame::before,
    .scanner-frame::after,
    .corner-br,
    .corner-bl {
      content: '';
      position: absolute;
      width: 32px;
      height: 32px;
      border-color: var(--gold);
      border-style: solid;
    }
    .scanner-frame::before { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .scanner-frame::after  { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .corner-br { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
    .corner-bl { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }

    .scan-line {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      animation: scanMove 2s linear infinite;
    }
    @keyframes scanMove {
      0%   { top: 10%; }
      50%  { top: 85%; }
      100% { top: 10%; }
    }

    /* MANUAL INPUT */
    .divider-label {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin: 16px 0;
      position: relative;
    }
    .divider-label::before, .divider-label::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 35%;
      height: 1px;
      background: var(--border);
    }
    .divider-label::before { left: 0; }
    .divider-label::after  { right: 0; }

    .input-row {
      display: flex;
      gap: 8px;
    }
    .input-row input {
      flex: 1;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: "Inter", Arial, sans-serif;
      background: #f7f9ff;
      color: var(--text);
    }
    .input-row input:focus {
      outline: none;
      border-color: var(--navy-mid);
    }
    .btn-cek {
      padding: 11px 18px;
      background: var(--navy);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-cek:active { opacity: 0.85; }

    /* RESULT CARD */
    .result-card {
      display: none;
      border-radius: 14px;
      overflow: hidden;
      margin-top: 20px;
      border: 2px solid var(--border);
    }
    .result-card.show { display: block; }

    .result-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .result-header.valid   { background: #e8f8ef; border-bottom: 2px solid #27ae60; }
    .result-header.invalid { background: #fdecea; border-bottom: 2px solid var(--red); }
    .result-header.sudah   { background: #fff3cd; border-bottom: 2px solid var(--gold); }

    .result-icon { font-size: 28px; }
    .result-title {
      font-size: 15px;
      font-weight: 800;
      color: var(--text);
    }
    .result-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .result-body { padding: 16px; }
    .result-body table { width: 100%; border-collapse: collapse; }
    .result-body td {
      padding: 7px 4px;
      font-size: 13px;
      border-bottom: 1px solid #f0f2f8;
      vertical-align: top;
    }
    .result-body td:first-child {
      color: var(--muted);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      width: 38%;
    }
    .result-body td:last-child {
      color: var(--text);
      font-weight: 600;
    }
    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }
    .status-badge.belum  { background: #e8f8ef; color: var(--green); }
    .status-badge.sudah  { background: #fff3cd; color: #7a5c00; }

    .qr-preview {
      display: flex;
      justify-content: center;
      margin: 12px 0 4px;
    }
    .qr-preview img {
      width: 120px;
      height: 120px;
      border-radius: 10px;
      border: 2px solid var(--border);
    }

    .btn-approve {
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      background: linear-gradient(135deg, var(--green), var(--green-light));
      color: var(--white);
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0.3px;
    }
    .btn-approve:active { opacity: 0.85; }
    .btn-approve:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .btn-scan-lagi {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      background: transparent;
      color: var(--navy);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--navy);
      color: var(--white);
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
      transition: transform 0.3s ease;
      z-index: 999;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--green); }
    .toast.error   { background: var(--red); }

    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(13,34,80,0.45);
      z-index: 998;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
    }
    .loading-overlay.show { display: flex; }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay p { color: var(--white); font-weight: 600; font-size: 14px; }

    .page-footer {
      width: 100%; max-width: 480px;
      padding: 16px 20px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.6;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">Sistem Validasi Kehadiran</div>
  <div class="header-title">Scanner <span>QR Code</span></div>
  <div class="header-sub">Cek Kesehatan Darah · Minggu, 19 Juli 2026</div>
</div>

<div class="status-bar">
  <div class="stat-item">
    <div class="stat-num" id="statTotal">–</div>
    <div class="stat-label">Total Daftar</div>
  </div>
  <div class="stat-item">
    <div class="stat-num" id="statBelum">–</div>
    <div class="stat-label">Belum Hadir</div>
  </div>
  <div class="stat-item">
    <div class="stat-num" id="statHadir">–</div>
    <div class="stat-label">Sudah Hadir</div>
  </div>
</div>

<div class="card">

  <!-- SCANNER -->
  <div class="scanner-wrap">
    <div id="qr-reader"></div>
    <div class="scanner-overlay">
      <div class="scanner-frame">
        <div class="corner-br"></div>
        <div class="corner-bl"></div>
        <div class="scan-line"></div>
      </div>
    </div>
  </div>

  <!-- MANUAL -->
  <div class="divider-label">atau cari manual</div>
  <div class="input-row">
    <input type="text" id="inputKTP" placeholder="Masukkan No KTP (16 digit)" inputmode="numeric" maxlength="16" />
    <button class="btn-cek" onclick="cariManual()">🔍 Cek</button>
  </div>

  <!-- RESULT -->
  <div class="result-card" id="resultCard">
    <div class="result-header" id="resultHeader">
      <div class="result-icon" id="resultIcon"></div>
      <div>
        <div class="result-title" id="resultTitle"></div>
        <div class="result-sub" id="resultSub"></div>
      </div>
    </div>
    <div class="result-body">
      <div class="qr-preview"><img id="resultQR" src="" alt="QR" /></div>
      <table id="resultTable"></table>
      <button class="btn-approve" id="btnApprove" onclick="approveKehadiran()">✅ &nbsp;Konfirmasi Kehadiran</button>
      <button class="btn-scan-lagi" onclick="scanLagi()">↩ Scan Peserta Lain</button>
    </div>
  </div>

</div>

<div class="page-footer">
  <strong>GBI Pasarkemis Rayon 3</strong><br>
  Hubungi: 0813-2810-3054 (Ibu Hana)
</div>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p id="loadingText">Memproses...</p>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwcSM-L5ipVHsZvWQmEIqG_otp-te3Wy2ks9r9UeIXjrvMBf_qLS_3eWi4eEQakb2uq/exec";

  let currentData = null;
  let html5QrCode = null;
  let scanning = true;

  // ── INIT SCANNER ──────────────────────────────────────────────────
  function startScanner() {
    html5QrCode = new Html5Qrcode("qr-reader");
    html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 220, height: 220 } },
      (decodedText) => {
        if (!scanning) return;
        scanning = false;
        prosesQR(decodedText);
      },
      () => {}
    ).catch(err => {
      console.warn("Kamera tidak tersedia:", err);
    });
  }

  // ── PARSE QR ──────────────────────────────────────────────────────
  // Format QR: NO:0001|NAMA:John Doe|KTP:1234567890123456
  function prosesQR(text) {
    const parts = {};
    text.split('|').forEach(p => {
      const [k, ...v] = p.split(':');
      parts[k] = v.join(':');
    });
    const noKTP = parts['KTP'];
    if (!noKTP) {
      showToast('QR tidak valid', 'error');
      scanning = true;
      return;
    }
    cekPeserta(noKTP);
  }

  // ── MANUAL SEARCH ─────────────────────────────────────────────────
  function cariManual() {
    const ktp = document.getElementById('inputKTP').value.trim();
    if (!ktp || ktp.length < 16) {
      showToast('No KTP harus 16 digit', 'error');
      return;
    }
    cekPeserta(ktp);
  }

  // ── CEK KE SHEET ──────────────────────────────────────────────────
  function cekPeserta(noKTP) {
    showLoading('Mengecek data peserta...');
    fetch(`${APPS_SCRIPT_URL}?action=cek&noKTP=${encodeURIComponent(noKTP)}`)
      .then(r => r.json())
      .then(data => {
        hideLoading();
        if (data.status === 'error') {
          tampilError(data.pesan);
        } else {
          currentData = data;
          tampilHasil(data);
        }
        muatStatistik();
      })
      .catch(err => {
        hideLoading();
        showToast('Gagal terhubung: ' + err.message, 'error');
        scanning = true;
      });
  }

  // ── TAMPIL HASIL ──────────────────────────────────────────────────
  function tampilHasil(d) {
    const card   = document.getElementById('resultCard');
    const header = document.getElementById('resultHeader');
    const icon   = document.getElementById('resultIcon');
    const title  = document.getElementById('resultTitle');
    const sub    = document.getElementById('resultSub');
    const table  = document.getElementById('resultTable');
    const btnApp = document.getElementById('btnApprove');
    const qrImg  = document.getElementById('resultQR');

    const sudahHadir = d.statusHadir && d.statusHadir.includes('Hadir');

    // Header warna
    header.className = 'result-header ' + (sudahHadir ? 'sudah' : 'valid');
    icon.textContent  = sudahHadir ? '⚠️' : '✅';
    title.textContent = sudahHadir ? 'Sudah Check-in!' : 'Peserta Ditemukan';
    sub.textContent   = sudahHadir
      ? 'Peserta ini sudah dikonfirmasi sebelumnya'
      : 'Data valid – silakan konfirmasi kehadiran';

    // QR
    qrImg.src = d.qrURL || '';

    // Tabel data
    const formatTgl = (val) => {
      if (!val) return '-';
      const d = new Date(val);
      return isNaN(d) ? val : d.toLocaleDateString('id-ID', {day:'2-digit', month:'long', year:'numeric'});
    };

    table.innerHTML = `
      <tr><td>No Urut</td><td>#${String(d.noUrut).padStart(4,'0')}</td></tr>
      <tr><td>Nama</td><td>${d.nama}</td></tr>
      <tr><td>Jenis Kelamin</td><td>${d.jenisKelamin}</td></tr>
      <tr><td>No KTP</td><td>${d.noKTP}</td></tr>
      <tr><td>Tgl Lahir</td><td>${formatTgl(d.tglLahir)}</td></tr>
      <tr><td>Usia</td><td>${d.usia} tahun</td></tr>
      <tr><td>No Telp</td><td>${d.noTelp}</td></tr>
      <tr><td>Tgl Daftar</td><td>${d.tglDaftar}</td></tr>
      <tr><td>Status</td><td>
        <span class="status-badge ${sudahHadir ? 'sudah' : 'belum'}">
          ${sudahHadir ? d.statusHadir : '⏳ Belum Hadir'}
        </span>
      </td></tr>
    `;

    // Tombol approve
    if (sudahHadir) {
      btnApp.disabled = true;
      btnApp.textContent = '⚠️  Sudah Dikonfirmasi';
    } else {
      btnApp.disabled = false;
      btnApp.textContent = '✅  Konfirmasi Kehadiran';
    }

    card.classList.add('show');
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function tampilError(pesan) {
    const card   = document.getElementById('resultCard');
    const header = document.getElementById('resultHeader');
    const icon   = document.getElementById('resultIcon');
    const title  = document.getElementById('resultTitle');
    const sub    = document.getElementById('resultSub');
    const table  = document.getElementById('resultTable');
    const btnApp = document.getElementById('btnApprove');
    const qrImg  = document.getElementById('resultQR');

    header.className  = 'result-header invalid';
    icon.textContent  = '❌';
    title.textContent = 'Peserta Tidak Ditemukan';
    sub.textContent   = pesan;
    table.innerHTML   = '';
    qrImg.src         = '';
    btnApp.disabled   = true;
    btnApp.textContent = '❌ Tidak Dapat Dikonfirmasi';

    card.classList.add('show');
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    scanning = true;
  }

  // ── APPROVE ───────────────────────────────────────────────────────
  function approveKehadiran() {
    if (!currentData) return;
    showLoading('Menyimpan konfirmasi...');

    fetch(`${APPS_SCRIPT_URL}?action=approve&rowIndex=${currentData.rowIndex}`)
      .then(r => r.json())
      .then(res => {
        hideLoading();
        if (res.status === 'ok') {
          showToast('✅ Kehadiran ' + currentData.nama + ' berhasil dikonfirmasi!', 'success');
          // update tampilan badge
          currentData.statusHadir = '✅ Hadir';
          tampilHasil(currentData);
          muatStatistik();
        } else {
          showToast('Gagal: ' + res.pesan, 'error');
        }
      })
      .catch(err => {
        hideLoading();
        showToast('Gagal: ' + err.message, 'error');
      });
  }

  // ── STATISTIK ─────────────────────────────────────────────────────
  function muatStatistik() {
    fetch(`${APPS_SCRIPT_URL}?action=statistik`)
      .then(r => r.json())
      .then(res => {
        if (res.status === 'ok') {
          document.getElementById('statTotal').textContent = res.total;
          document.getElementById('statHadir').textContent = res.hadir;
          document.getElementById('statBelum').textContent = res.belum;
        }
      })
      .catch(() => {});
  }

  // ── SCAN LAGI ─────────────────────────────────────────────────────
  function scanLagi() {
    document.getElementById('resultCard').classList.remove('show');
    document.getElementById('inputKTP').value = '';
    currentData = null;
    scanning = true;
  }

  // ── HELPERS ───────────────────────────────────────────────────────
  function showLoading(text) {
    document.getElementById('loadingText').textContent = text || 'Memproses...';
    document.getElementById('loadingOverlay').classList.add('show');
  }
  function hideLoading() {
    document.getElementById('loadingOverlay').classList.remove('show');
  }

  let toastTimer;
  function showToast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show ' + (type || '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = 'toast', 3000);
  }

  // ── START ─────────────────────────────────────────────────────────
  startScanner();
  muatStatistik();

  // Enter key di input KTP
  document.getElementById('inputKTP').addEventListener('keydown', e => {
    if (e.key === 'Enter') cariManual();
  });
</script>
</body>
</html>
